name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish RU indexable deep links
        run: |
          for route in \
            ru \
            ru/privlechenie-investitsiy \
            ru/sdelki-m-a \
            ru/yuridicheskoe-soprovozhdenie-investitsiy \
            ru/mezhdunarodnyy-yurist-rossiya \
            ru/arbitrazhnye-spory \
            ru/nedvizhimost-i-arenda \
            ru/services/international-migration-coordination \
            ru/o-nas \
            ru/kontakty \
            ru/konsultatsiya-oplata \
            ru/insights \
            ru/insights/samovolnaya-rekonstruktsiya-i-pereplanirovka \
            ru/insights/bezdejstvie-pristava \
            ru/insights/subsidiarnaya-otvetstvennost-prezumptsii \
            ru/insights/dogovor-arendy-kak-dokazatelstvo \
            ru/insights/osparivanie-kadastrovoj-stoimosti \
            ru/insights/registratsiya-tovarnogo-znaka-podgotovka-dokumentov; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done

      - name: Patch international migration route metadata
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const file = "dist/ru/services/international-migration-coordination/index.html";
          const title = "Международные миграционные вопросы — координация с иностранными специалистами | Верди и Ко.";
          const description = "Координация русскоязычного клиента с иностранными адвокатами и специалистами: вид на жительство, семейное воссоединение, статус высококвалифицированного специалиста, документы, сроки, расходы и риски.";
          const url = "https://www.verdico.ru/ru/services/international-migration-coordination";

          let html = readFileSync(file, "utf8");
          html = html
            .replace(/<title>.*?<\/title>/, `<title>${title}</title>`)
            .replace(/<meta name="description" content="[^"]*" \/>/, `<meta name="description" content="${description}" />`)
            .replace(/<link rel="canonical" href="[^"]*" \/>/, `<link rel="canonical" href="${url}" />`)
            .replace(/<meta property="og:url" content="[^"]*" \/>/, `<meta property="og:url" content="${url}" />`)
            .replace(/<meta property="og:title" content="[^"]*" \/>/, `<meta property="og:title" content="${title}" />`)
            .replace(/<meta property="og:description" content="[^"]*" \/>/, `<meta property="og:description" content="${description}" />`)
            .replace(/<meta name="twitter:title" content="[^"]*" \/>/, `<meta name="twitter:title" content="${title}" />`)
            .replace(/<meta name="twitter:description" content="[^"]*" \/>/, `<meta name="twitter:description" content="${description}" />`);

          writeFileSync(file, html);
          NODE

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
