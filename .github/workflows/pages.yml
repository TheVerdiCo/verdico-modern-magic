name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish RU indexable deep links
        run: |
          for route in \
            ru \
            ru/privlechenie-investitsiy \
            ru/sdelki-m-a \
            ru/yuridicheskoe-soprovozhdenie-investitsiy \
            ru/mezhdunarodnyy-yurist-rossiya \
            ru/arbitrazhnye-spory \
            ru/nedvizhimost-i-arenda \
            ru/services/international-migration-coordination \
            ru/mezhdunarodnye-aktivy \
            ru/kipr-nedvizhimost-pmzh \
            ru/gretsiya-vnzh-san-tome-grazhdanstvo \
            ru/tailand-phuket-kurortnye-rezidentsii \
            ru/kommercheskaya-nedvizhimost-zarubezhom \
            ru/o-nas \
            ru/kontakty \
            ru/konsultatsiya-oplata \
            ru/insights \
            ru/insights/samovolnaya-rekonstruktsiya-i-pereplanirovka \
            ru/insights/bezdejstvie-pristava \
            ru/insights/subsidiarnaya-otvetstvennost-prezumptsii \
            ru/insights/dogovor-arendy-kak-dokazatelstvo \
            ru/insights/osparivanie-kadastrovoj-stoimosti \
            ru/insights/registratsiya-tovarnogo-znaka-podgotovka-dokumentov; do
            mkdir -p "dist/$route"
            cp dist/index.html "dist/$route/index.html"
          done

      - name: Patch published route metadata
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const pages = [
            {
              file: "dist/ru/services/international-migration-coordination/index.html",
              title: "Международные миграционные вопросы — координация с иностранными специалистами | Верди и Ко.",
              description: "Координация русскоязычного клиента с иностранными адвокатами и специалистами: вид на жительство, семейное воссоединение, статус высококвалифицированного специалиста, документы, сроки, расходы и риски.",
              url: "https://www.verdico.ru/ru/services/international-migration-coordination/",
            },
            {
              file: "dist/ru/mezhdunarodnye-aktivy/index.html",
              title: "Международные активы | Верди и Ко.",
              description: "Недвижимость, ВНЖ, ПМЖ, второе гражданство и доходные объекты за рубежом с юридико-коммерческой координацией Верди и Ко.",
              url: "https://www.verdico.ru/ru/mezhdunarodnye-aktivy/",
            },
            {
              file: "dist/ru/kipr-nedvizhimost-pmzh/index.html",
              title: "Недвижимость и ПМЖ на Кипре для частного капитала | Верди и Ко.",
              description: "Юридико-коммерческая координация приобретения недвижимости на Кипре, вопросов ПМЖ, налоговой структуры, банковских требований и семейного планирования.",
              url: "https://www.verdico.ru/ru/kipr-nedvizhimost-pmzh/",
            },
            {
              file: "dist/ru/gretsiya-vnzh-san-tome-grazhdanstvo/index.html",
              title: "ВНЖ в Греции, гражданство Сан-Томе и доходная недвижимость | Верди и Ко.",
              description: "Координация семейного маршрута: вид на жительство в Греции, второе гражданство Сан-Томе и доходная недвижимость с отдельной проверкой условий.",
              url: "https://www.verdico.ru/ru/gretsiya-vnzh-san-tome-grazhdanstvo/",
            },
            {
              file: "dist/ru/tailand-phuket-kurortnye-rezidentsii/index.html",
              title: "Курортные резиденции на Пхукете | Верди и Ко.",
              description: "Юридико-коммерческая координация приобретения курортной резиденции на Пхукете: форма владения, управление, аренда, расчёты и проверка проекта.",
              url: "https://www.verdico.ru/ru/tailand-phuket-kurortnye-rezidentsii/",
            },
            {
              file: "dist/ru/kommercheskaya-nedvizhimost-zarubezhom/index.html",
              title: "Коммерческая недвижимость за рубежом | Верди и Ко.",
              description: "Координация сделок с зарубежной коммерческой недвижимостью: офисами, гостиницами, доходными домами, торговыми объектами и проектами развития.",
              url: "https://www.verdico.ru/ru/kommercheskaya-nedvizhimost-zarubezhom/",
            },
          ];

          for (const page of pages) {
            let html = readFileSync(page.file, "utf8");
            html = html
              .replace(/<title>.*?<\/title>/, `<title>${page.title}</title>`)
              .replace(/<meta name="description" content="[^"]*" \/>/, `<meta name="description" content="${page.description}" />`)
              .replace(/<meta property="og:title" content="[^"]*" \/>/, `<meta property="og:title" content="${page.title}" />`)
              .replace(/<meta property="og:description" content="[^"]*" \/>/, `<meta property="og:description" content="${page.description}" />`)
              .replace(/<meta name="twitter:title" content="[^"]*" \/>/, `<meta name="twitter:title" content="${page.title}" />`)
              .replace(/<meta name="twitter:description" content="[^"]*" \/>/, `<meta name="twitter:description" content="${page.description}" />`);

            const canonicalTag = `<link rel="canonical" href="${page.url}" />`;
            if (/<link rel="canonical" href="[^"]*" \/>/.test(html)) {
              html = html.replace(/<link rel="canonical" href="[^"]*" \/>/, canonicalTag);
            } else {
              html = html.replace("</title>", `</title>\n    ${canonicalTag}`);
            }

            const openGraphUrlTag = `<meta property="og:url" content="${page.url}" />`;
            if (/<meta property="og:url" content="[^"]*" \/>/.test(html)) {
              html = html.replace(/<meta property="og:url" content="[^"]*" \/>/, openGraphUrlTag);
            } else {
              html = html.replace("<!-- Open Graph -->", `<!-- Open Graph -->\n    ${openGraphUrlTag}`);
            }

            writeFileSync(page.file, html);
          }
          NODE

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
