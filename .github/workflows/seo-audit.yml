name: SEO audit

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: test -d dist

      - name: Install Lighthouse CI
        run: npm install --global @lhci/cli

      - name: Run Lighthouse CI
        run: lhci autorun
